name: Build Steam (Windows)

# Enable the tag trigger once resources/ icons exist and signing is ready.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Windows
        run: npm run package:win

      # Steam ships the unpacked app (run directly via SteamPipe), not the NSIS
      # installer. electron-builder emits both; upload the unpacked dir.
      - uses: actions/upload-artifact@v4
        with:
          name: jigsaw-windows
          path: release/win-unpacked
