name: Build Steam (Linux)

# Enable the tag trigger once resources/ icons exist.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package Linux
        run: npm run package:linux

      # Steam ships the unpacked app, not the AppImage.
      - uses: actions/upload-artifact@v4
        with:
          name: jigsaw-linux
          path: release/linux-unpacked
