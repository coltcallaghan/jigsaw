name: Build iOS

# Requires an Apple Developer account + secrets:
#   IOS_CERTIFICATE_P12_BASE64, IOS_CERTIFICATE_PASSWORD,
#   APPSTORE_ISSUER_ID, APPSTORE_KEY_ID, APPSTORE_PRIVATE_KEY, APPLE_TEAM_ID
# Also requires ios/App/ExportOptions.plist with the real Team ID
# (the ios/ project is gitignored and regenerated below).
# Enable the tag trigger once these are configured.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      # Native project is gitignored; regenerate then sync.
      - name: Generate + sync iOS project
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Archive + export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App \
            -configuration Release -archivePath build/App.xcarchive archive
          xcodebuild -exportArchive -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist -exportPath build

      - uses: actions/upload-artifact@v4
        with:
          name: jigsaw-ios
          path: ios/App/build/*.ipa
